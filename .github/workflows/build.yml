name: Build
run-name: Build ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Sollumz 2.8.3
        uses: actions/checkout@v4
        with:
          repository: Sollumz/Sollumz
          ref: v2.8.3
          path: .build/Sollumz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release package
        shell: pwsh
        env:
          BUILD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || (github.ref == 'refs/heads/main' && 'latest' || format('build-{0}-{1}', github.run_number, github.sha)) }}
        run: >-
          ./scripts/build_release.ps1
          -OutputDirectory dist
          -SollumzSource .build/Sollumz
          -Version $env:BUILD_VERSION
          -SollumzVersion v2.8.3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CK-model_renderer-${{ github.run_number }}-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem dist -File | Where-Object { $_.Extension -eq '.zip' -or $_.Name.EndsWith('.sha256') }
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $releaseTag = $env:GITHUB_REF_NAME
            gh release view $releaseTag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh release upload $releaseTag @($files.FullName) --clobber
            } else {
              gh release create $releaseTag @($files.FullName) --title $releaseTag --generate-notes
            }
          } else {
            $releaseTag = 'latest'
            $title = 'Latest Build'
            $notes = "Automated build for commit $env:GITHUB_SHA on main."
            gh release view $releaseTag *> $null
            if ($LASTEXITCODE -eq 0) {
              gh api --method PATCH "repos/$env:GITHUB_REPOSITORY/git/refs/tags/$releaseTag" -f sha=$env:GITHUB_SHA -F force=true
              gh release upload $releaseTag @($files.FullName) --clobber
              gh release edit $releaseTag --title $title --notes $notes --latest
            } else {
              gh release create $releaseTag @($files.FullName) --target $env:GITHUB_SHA --title $title --notes $notes --latest
            }
          }

name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Sollumz 2.8.3
        uses: actions/checkout@v4
        with:
          repository: Sollumz/Sollumz
          ref: v2.8.3
          path: .build/Sollumz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release package
        shell: pwsh
        env:
          BUILD_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
        run: >-
          ./scripts/build_release.ps1
          -OutputDirectory dist
          -SollumzSource .build/Sollumz
          -Version $env:BUILD_VERSION
          -SollumzVersion v2.8.3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CK-model_renderer-${{ github.run_number }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem dist -File | Where-Object { $_.Extension -eq '.zip' -or $_.Name.EndsWith('.sha256') }
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME @($files.FullName) --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME @($files.FullName) --title $env:GITHUB_REF_NAME --generate-notes
          }

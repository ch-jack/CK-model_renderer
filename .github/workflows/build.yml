name: Build
run-name: Build ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Sollumz 2.8.3
        uses: actions/checkout@v4
        with:
          repository: Sollumz/Sollumz
          ref: v2.8.3
          path: .build/Sollumz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release package
        shell: pwsh
        env:
          BUILD_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
        run: >-
          ./scripts/build_release.ps1
          -OutputDirectory dist
          -SollumzSource .build/Sollumz
          -Version $env:BUILD_VERSION
          -SollumzVersion v2.8.3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CK-model_renderer-${{ github.run_number }}-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseTag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "v1.0.$env:GITHUB_RUN_NUMBER" }
          $files = Get-ChildItem dist -File | Where-Object { $_.Extension -eq '.zip' -or $_.Name.EndsWith('.sha256') }

          $ErrorActionPreference = 'SilentlyContinue'
          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = 'Stop'

          if ($releaseExists) {
            gh release upload $releaseTag @($files.FullName) --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $releaseTag @($files.FullName) --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $releaseTag --generate-notes
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release command exited with code $LASTEXITCODE"
          }

  notify-build-success:
    name: Send build email
    needs: build
    if: ${{ github.event_name != 'pull_request' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Call existing CK mail API
        shell: bash
        env:
          CK_API_SHARED_SECRET: ${{ secrets.CK_API_SHARED_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CK_API_SHARED_SECRET:-}" ]]; then
            echo "::error::CK_API_SHARED_SECRET is not configured"
            exit 1
          fi

          payload="$(jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg ref "$GITHUB_REF" \
            --arg ref_name "$GITHUB_REF_NAME" \
            --arg sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg repository_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            '{
              type: "github_actions_build_success",
              repository: $repository,
              workflow: $workflow,
              run_id: $run_id,
              run_number: $run_number,
              event: $event,
              ref: $ref,
              ref_name: $ref_name,
              sha: $sha,
              actor: $actor,
              result: "success",
              run_url: $run_url,
              repository_url: $repository_url
            }')"

          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-CK-API-Key: ${CK_API_SHARED_SECRET}" \
            --data "$payload" \
            "https://api.ckcloud.de5.net/api/admin/test-email"
